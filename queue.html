<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vistruct - Queue Visualization</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ====== Queue Page Custom Styling ====== */
    body {
      font-family: 'Poppins', sans-serif;
       background: linear-gradient(135deg, #e0c3fc, #8ec5fc);
      margin: 0;
      padding: 0;
      text-align: center;
      color: #333;
    }
nav {
  background: #1e272e;
  padding: 1rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

nav h1 {
  color: #00a8ff;
  font-size: 1.4rem;
  margin: 0;
}

nav ul {
  list-style: none;
  display: flex;
  gap: 20px;
  margin: 0;
  padding: 0;
}

nav ul li a {
  color: #d2dae2;
  text-decoration: none;
  font-weight: 500;
  transition: 0.3s;
  padding: 6px 10px;
  border-radius: 6px;
}

nav ul li a:hover {
  background: #00a8ff;
  color: white;
}

nav ul li a.active {
  background: #00a8ff;
  color: white;
  font-weight: bold;
}

    .container {
      margin-top: 80px;
      padding: 20px;
    }

    h2 {
      font-size: 2rem;
      color:black;
      margin-bottom: 10px;
    }

    p {
      font-size: 1rem;
      color: #222;
    }

    /* Queue Visualization Section */
    .queue-wrapper {
      display: inline-block;
      text-align: center;
      margin-top: 40px;
    }

    .queue-container {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      margin: 20px auto 10px;
      gap: 15px;
      flex-wrap: wrap;
      transition: all 0.3s ease;
    }

    .node {
      position: relative;
      width: 70px;
      height: 70px;
      background-color: #007bff;
      color: white;
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      font-size: 1.2rem;
      box-shadow: 0 3px 6px rgba(0, 0, 0, 0.3);
      transition: all 0.4s ease-in-out;
    }

    .index-label {
      position: absolute;
      bottom: -25px;
      left: 0;
      right: 0;
      font-size: 0.9rem;
      color: #000;
      font-weight: 600;
    }

    /* Front & Rear Labels */
    .front-label, .rear-label {
      position: absolute;
      top: -25px;
      left: 0;
      right: 0;
      font-size: 0.8rem;
      font-weight: bold;
      color: white;
    }

    .front {
      border: 3px solid #ff4b2b;
      background-color: #ff6f61;
    }

    .rear {
      border: 3px solid #00c851;
      background-color: #00c851;
    }

    /* Enqueue / Dequeue Animation */
    @keyframes enqueueSlide {
      0% {
        transform: translateY(-80px) scale(0.5);
        opacity: 0;
      }
      100% {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
    }

    @keyframes dequeueSlide {
      0% {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translateY(80px) scale(0.5);
        opacity: 0;
      }
    }

    .enqueue-animation {
      animation: enqueueSlide 0.5s ease-out;
    }

    .dequeue-animation {
      animation: dequeueSlide 0.4s ease-in forwards;
    }

    .controls {
      margin-top: 30px;
    }

    input[type="number"] {
      padding: 10px;
      width: 150px;
      border: 2px solid #007bff;
      border-radius: 10px;
      margin-right: 10px;
      text-align: center;
      font-size: 1rem;
      background: #f8f8f8;
    }

    button {
      background-color: #007bff;
      color: white;
      border: none;
      padding: 10px 15px;
      margin: 5px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #0056b3;
    }

    .info {
      margin-top: 15px;
      font-weight: 500;
      color: #222;
      background: white;
      padding: 8px 15px;
      border-radius: 10px;
      display: inline-block;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <nav>
    <h1>Vistruct</h1>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="array1.html">Array</a></li>
      <li><a href="stack.html">Stack</a></li>
      <li><a href="queue.html" class="active">Queue</a></li>
      <li><a href="linkedlist.html">Linked List</a></li>
      <li><a href="tree.html">Tree</a></li>
      <li><a href="graph.html">Graph</a></li>
      <li><a href="chatbot.html">Chatbot</a></li>
    </ul>
  </nav>

  <div class="container">
    <h2>Queue Visualization</h2>
    <p>Visualize enqueue and dequeue operations with clear index positions and values.</p>

    <div class="controls">
      <input type="number" id="queueValue" placeholder="Enter value" />
      <button onclick="enqueue()">Enqueue</button>
      <button onclick="dequeue()">Dequeue</button>
      <button onclick="clearQueue()">Clear</button>
    </div>

    <div class="queue-wrapper">
      <div class="queue-container" id="queueContainer"></div>
      <div class="info" id="infoText"></div>
    </div>
  </div>

  <script>
    const queue = [];
    const queueContainer = document.getElementById("queueContainer");
    const infoText = document.getElementById("infoText");

    let baseIndex = -1; // start index

    function renderQueue(animationType = null) {
      queueContainer.innerHTML = "";

      queue.forEach((value, idx) => {
        const node = document.createElement("div");
        node.classList.add("node");
        node.textContent = value;

        if (animationType === "enqueue" && idx === queue.length - 1) {
          node.classList.add("enqueue-animation");
        }

        // Add index label below
        const indexLabel = document.createElement("div");
        indexLabel.classList.add("index-label");
        indexLabel.textContent = `Index ${baseIndex + idx + 1}`;
        node.appendChild(indexLabel);

        // Add front/rear label
        if (idx === 0) {
          node.classList.add("front");
          const frontLabel = document.createElement("div");
          frontLabel.classList.add("front-label");
          frontLabel.textContent = "Front";
          node.appendChild(frontLabel);
        }
        if (idx === queue.length - 1) {
          node.classList.add("rear");
          const rearLabel = document.createElement("div");
          rearLabel.classList.add("rear-label");
          rearLabel.textContent = "Rear";
          node.appendChild(rearLabel);
        }

        queueContainer.appendChild(node);
      });

      if (queue.length === 0) {
        infoText.textContent = "Queue is empty | Front index: -1 | Rear index: -1";
      } else {
        infoText.textContent = `Front index: ${baseIndex + 1} | Rear index: ${baseIndex + queue.length}`;
      }
    }

    function enqueue() {
      const value = document.getElementById("queueValue").value;
      if (value === "") {
        alert("Please enter a value to enqueue.");
        return;
      }

      if (queue.length >= 7) {
        alert("Queue overflow! Maximum 7 elements allowed.");
        return;
      }

      queue.push(value);
      renderQueue("enqueue");
      document.getElementById("queueValue").value = "";
    }

    function dequeue() {
      if (queue.length === 0) {
        alert("Queue underflow! The queue is empty.");
        return;
      }

      baseIndex++;
      queue.shift();
      renderQueue();
    }

    function clearQueue() {
      queue.length = 0;
      baseIndex = -1;
      renderQueue();
    }

    renderQueue();

    // Highlight active page
    const current = location.pathname.split("/").slice(-1)[0];
    document.querySelectorAll("nav ul li a").forEach(a => {
      if (a.getAttribute("href") === current) a.classList.add("active");
    });
  </script>
</body>
</html>
