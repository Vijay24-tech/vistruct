<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vistruct - Linked List Visualization</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ===== Linked List Page Custom Styling ===== */
    body {
      font-family: 'Poppins', sans-serif;
     background: linear-gradient(135deg, #e0c3fc, #8ec5fc);
      margin: 0;
      padding: 0;
      text-align: center;
      color: #333;
    }

nav {
  background: #1e272e;
  padding: 1rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

nav h1 {
  color: #00a8ff;
  font-size: 1.4rem;
  margin: 0;
}

nav ul {
  list-style: none;
  display: flex;
  gap: 20px;
  margin: 0;
  padding: 0;
}

nav ul li a {
  color: #d2dae2;
  text-decoration: none;
  font-weight: 500;
  transition: 0.3s;
  padding: 6px 10px;
  border-radius: 6px;
}

nav ul li a:hover {
  background: #00a8ff;
  color: white;
}

nav ul li a.active {
  background: #00a8ff;
  color: white;
  font-weight: bold;
}
   
    .container {
      margin-top: 80px;
      padding: 20px;
    }

    h2 {
      font-size: 2rem;
      color:black;
      margin-bottom: 20px;
    }

    .controls {
      margin-bottom: 25px;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 120px;
      border: 1px solid #007bff;
      border-radius: 8px;
      text-align: center;
      font-size: 1rem;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.2s ease;
    }

    button:hover {
      background: #0056b3;
      transform: scale(1.05);
    }

    .list-container {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      min-height: 150px;
      margin-top: 30px;
      position: relative;
    }

    .node {
      background: #28a745;
      color: white;
      border-radius: 10px;
      width: 100px;
      height: 60px;
      margin: 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      transition: all 0.5s ease;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
    }

    .node.highlight {
      background: #ffc107;
      transform: scale(1.1);
    }

    .arrow {
      width: 40px;
      height: 3px;
      background: #333;
      position: relative;
    }

    .arrow::after {
      content: "";
      position: absolute;
      right: 0;
      top: -5px;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      border-left: 10px solid #333;
    }

    #message {
      margin-top: 25px;
      font-size: 18px;
      color: #333;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <nav>
    <h1>Vistruct</h1>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="array1.html">Array</a></li>
      <li><a href="stack.html">Stack</a></li>
      <li><a href="queue.html">Queue</a></li>
      <li><a href="linkedlist.html" class="active">Linked List</a></li>
      <li><a href="tree.html">Tree</a></li>
      <li><a href="graph.html">Graph</a></li>
      <li><a href="chatbot.html">Chatbot</a></li>
    </ul>
  </nav>

  <div class="container">
    <h2>🔗 Linked List Visualization</h2>

    <div class="controls">
      <input type="text" id="value" placeholder="Enter Value" />
      <button onclick="insertNode()">Insert</button>
      <button onclick="deleteNode()">Delete</button>
      <button onclick="searchNode()">Search</button>
      <button onclick="resetList()">Reset</button>
    </div>

    <div class="list-container" id="listContainer"></div>
    <p id="message">A Linked List stores data in nodes connected by pointers.</p>
  </div>

  <script>
    let linkedList = [];
    const container = document.getElementById("listContainer");
    const msg = document.getElementById("message");

    function renderList() {
      container.innerHTML = "";
      linkedList.forEach((node, index) => {
        const div = document.createElement("div");
        div.className = "node";
        div.innerHTML = `<div>${node}</div><small>next →</small>`;
        container.appendChild(div);

        if (index < linkedList.length - 1) {
          const arrow = document.createElement("div");
          arrow.className = "arrow";
          container.appendChild(arrow);
        }
      });

      msg.textContent =
        linkedList.length === 0
          ? "List is empty."
          : `Current Linked List: ${linkedList.join(" → ")} → NULL`;
    }

    function insertNode() {
      const val = document.getElementById("value").value.trim();
      if (!val) return alert("Enter a value to insert!");

      linkedList.push(val);
      renderList();

      const nodes = document.querySelectorAll(".node");
      const newNode = nodes[nodes.length - 1];
      newNode.classList.add("highlight");

      msg.textContent = `Inserted '${val}' at the end of the list.`;
      setTimeout(() => newNode.classList.remove("highlight"), 800);
    }

    function deleteNode() {
      const val = document.getElementById("value").value.trim();
      if (!val) return alert("Enter value to delete!");

      const index = linkedList.indexOf(val);
      if (index === -1) {
        msg.textContent = `❌ Node '${val}' not found in list.`;
        return;
      }

      linkedList.splice(index, 1);
      renderList();
      msg.textContent = `🗑️ Deleted node '${val}' from the list.`;
    }

    function searchNode() {
      const val = document.getElementById("value").value.trim();
      if (!val) return alert("Enter value to search!");

      const nodes = document.querySelectorAll(".node");
      if (nodes.length === 0) {
        msg.textContent = "List is empty.";
        return;
      }

      let i = 0;
      msg.textContent = "Searching...";

      const interval = setInterval(() => {
        nodes.forEach(n => n.classList.remove("highlight"));
        if (i < nodes.length) {
          nodes[i].classList.add("highlight");
          msg.textContent = `Checking node '${linkedList[i]}'...`;

          if (linkedList[i] === val) {
            msg.textContent = `✅ Found node '${val}' at position ${i}.`;
            clearInterval(interval);
          }
          i++;
        } else {
          clearInterval(interval);
          msg.textContent = `❌ Node '${val}' not found in list.`;
        }
      }, 900);
    }

    function resetList() {
      linkedList = ["10", "20", "30"];
      renderList();
      msg.textContent = "List reset to default: 10 → 20 → 30 → NULL";
    }

    resetList();

    // Active page highlighter
    const current = location.pathname.split("/").slice(-1)[0];
    document.querySelectorAll("nav ul li a").forEach(a => {
      if (a.getAttribute("href") === current) a.classList.add("active");
    });
  </script>
</body>
</html>
